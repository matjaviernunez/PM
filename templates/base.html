<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Polla Mundialista 2026{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/predicciones.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ranking.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/hub.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>

  {% block content %}{% endblock %}

  <!-- Bottom nav (solo cuando hay sesión) -->
  {% if current_user and current_user.is_authenticated %}
  <nav class="bottom-nav">
    <a href="{{ url_for('predicciones.index') }}"
       class="nav-item {% if request.endpoint and 'predicciones' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">⚽</span>
      <span class="nav-label">Predicciones</span>
    </a>
    <a href="{{ url_for('torneo.index') }}"
       class="nav-item {% if request.endpoint and 'torneo' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">🌍</span>
      <span class="nav-label">Torneo</span>
    </a>
    <a href="{{ url_for('ranking.index') }}"
       class="nav-item {% if request.endpoint and 'ranking' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">Ranking</span>
    </a>
    <a href="{{ url_for('hub.index') }}"
       class="nav-item {% if request.endpoint and 'hub' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">📰</span>
      <span class="nav-label">Hub</span>
    </a>
    {% if current_user.es_admin %}
    <a href="{{ url_for('admin.index') }}"
       class="nav-item {% if request.endpoint and 'admin' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Admin</span>
    </a>
    {% endif %}
    <a href="{{ url_for('auth.perfil') }}"
       class="nav-item {% if request.endpoint == 'auth.perfil' %}active{% endif %}">
      <span class="nav-icon">👤</span>
      <span class="nav-label">{{ current_user.nickname[:8] }}</span>
    </a>
  </nav>
  {% endif %}

  {% block extra_js %}{% endblock %}
</body>
</html>
